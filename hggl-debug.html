<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGGL Debug v5</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 16px; font-size: 12px; }
  h2 { color: #f5c518; margin: 0 0 16px; }
  .test { background: #1e2a3a; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .label { color: #9ab; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  button { background: #f5c518; color: #111; border: none; border-radius: 8px; padding: 12px 20px;
           font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; margin-bottom: 12px; }
  pre { white-space: pre-wrap; font-size: 11px; color: #9ab; margin: 0; word-break: break-all; }
</style>
</head>
<body>
<h2>HGGL Debug v5 — Raw Results Row</h2>
<button onclick="runAll()">Run All Tests</button>

<div class="test"><div class="label">Raw keys in Result 1 (all fields returned from Sheet)</div><pre id="r1">—</pre></div>
<div class="test"><div class="label">Key values: Week, Team 1, Team 2, Side, MatchResult</div><pre id="r2">—</pre></div>
<div class="test"><div class="label">Course handicap calculation per player (Result 1)</div><pre id="r3">—</pre></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz1V4hse07WKBr2a8yTs_gD6dfNkqRXmOvzA-Ewqzos736fBg9WY_bgNX_ZUcbfCN2WOA/exec';
const SLOPE = 125, RATING = 69.4, PAR_FRONT = 36, PAR_BACK = 35;

function nineHoleHdcp(ghinIndex, side) {
  var idx = parseFloat(ghinIndex);
  if (isNaN(idx) || ghinIndex === '' || ghinIndex === null) return null;
  var par9 = side === 'front' ? PAR_FRONT : PAR_BACK;
  var raw = (idx * (SLOPE / 113) / 2) + (RATING / 2 - par9);
  return Math.floor(raw + 0.5);
}

async function runAll() {
  var res = await fetch(API + '?action=getLeagueData&v=' + Date.now());
  var json = await res.json();
  var results = (json.data || {}).results || [];

  if (!results.length) {
    document.getElementById('r1').textContent = 'No results returned';
    return;
  }

  var row = results[0];

  // Show ALL keys
  document.getElementById('r1').textContent = Object.keys(row).join('\n');

  // Show specific values
  document.getElementById('r2').textContent =
    'Week: ' + JSON.stringify(row.Week) + '\n' +
    'week: ' + JSON.stringify(row.week) + '\n' +
    'Team 1: ' + JSON.stringify(row['Team 1']) + '\n' +
    'Team1: ' + JSON.stringify(row.Team1) + '\n' +
    'Team 2: ' + JSON.stringify(row['Team 2']) + '\n' +
    'Side: ' + JSON.stringify(row.Side) + '\n' +
    'side: ' + JSON.stringify(row.side) + '\n' +
    'MatchResult: ' + JSON.stringify(row.MatchResult) + '\n' +
    'Result Text: ' + JSON.stringify(row['Result Text']) + '\n' +
    'Winner: ' + JSON.stringify(row.Winner);

  // Parse PlayerScoresJSON and show player handicaps
  var psj = row.PlayerScoresJSON || row['Player Scores JSON'] || row['Score Snapshot JSON'] || '';
  var parsed = {};
  try { parsed = JSON.parse(psj); } catch(e) { parsed = {}; }
  var snap = parsed.playersSnapshot || [];
  var side = (row.Side || row.side || '').indexOf('Front') !== -1 ? 'front' : 'back';

  var hdcpInfo = 'Side detected: ' + side + '\n\n';
  snap.forEach(function(p) {
    var hdcp = nineHoleHdcp(p.ghin, side);
    hdcpInfo += p.name + ': GHIN=' + p.ghin + ' → course hdcp=' + hdcp + '\n';
  });
  document.getElementById('r3').textContent = hdcpInfo;
}
</script>
</body>
</html>
